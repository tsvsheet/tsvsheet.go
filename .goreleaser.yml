version: 2

project_name: tsvsheet

dist: dist

git:
  ignore_tags:
    - "saved/*"

builds:
  - id: "{{ .ProjectName }}"
    main: ./cmd/{{ .ProjectName }}
    binary: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -buildvcs=false
      - -trimpath

archives:
  - id: default
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

nfpms:
  - id: packages
    package_name: tsvsheet
    vendor: tsvsheet
    homepage: https://tsvsheet.com
    maintainer: tsvsheet <noreply@tsvsheet.com>
    description: A spreadsheet for plain text — compute .tsvt grids of values and =formulas.
    license: MIT
    formats:
      - deb
      - rpm

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  mode: keep-existing

snapshot:
  version_template: "0.0.0-SNAPSHOT-{{.ShortCommit}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
