version: 2

project_name: tsv

dist: dist

# Shell completions and the man page ship in every archive and package. They
# are generated from the CLI's own command tree (the completion and man
# subcommands), into the goreleaser dist dir — after its cleanup, before any
# build.
before:
  hooks:
    - mkdir -p dist/extras/completions dist/extras/man
    - sh -c "go run ./cmd/tsv completion bash > dist/extras/completions/tsv.bash"
    - sh -c "go run ./cmd/tsv completion zsh > dist/extras/completions/tsv.zsh"
    - sh -c "go run ./cmd/tsv completion fish > dist/extras/completions/tsv.fish"
    - sh -c "go run ./cmd/tsv man > dist/extras/man/tsv.1"

git:
  ignore_tags:
    - "saved/*"

builds:
  - id: "{{ .ProjectName }}"
    main: ./cmd/{{ .ProjectName }}
    binary: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -buildvcs=false
      - -trimpath

archives:
  - id: default
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      - CHANGELOG*
      - src: dist/extras/completions/*
        dst: completions
      - src: dist/extras/man/*
        dst: man

nfpms:
  - id: packages
    package_name: tsv
    vendor: tsvsheet
    homepage: https://tsvsheet.com
    maintainer: tsvsheet <noreply@tsvsheet.com>
    description: A spreadsheet for plain text — compute .tsvt grids of values and =formulas.
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: dist/extras/completions/tsv.bash
        dst: /usr/share/bash-completion/completions/tsv
      - src: dist/extras/completions/tsv.zsh
        dst: /usr/share/zsh/site-functions/_tsv
      - src: dist/extras/completions/tsv.fish
        dst: /usr/share/fish/vendor_completions.d/tsv.fish
      - src: dist/extras/man/tsv.1
        dst: /usr/share/man/man1/tsv.1

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  mode: keep-existing

snapshot:
  version_template: "0.0.0-SNAPSHOT-{{.ShortCommit}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
